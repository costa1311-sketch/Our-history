<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi persona favorita</title>
    <style>
        body { 
            background: #fff5f8; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            color: #d63384; 
        }

        /* Contenedor principal para organizar izquierda/derecha */
        .container {
            display: flex;
            width: 80%;
            justify-content: space-around;
            align-items: center;
        }

        /* --- LA FLOR CON ANIMACIÓN DE ENTRADA --- */
        .flower { 
            position: relative; 
            animation: 
                intro-flower 2s ease-in-out forwards, /* Se mueve al lado */
                float 3s ease-in-out infinite 2s;    /* Flota después de moverse */
        }
        
        .petal { width: 50px; height: 80px; background: #ff85a2; position: absolute; border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%; transform-origin: bottom center; }
        .center { width: 40px; height: 40px; background: #ffd93d; border-radius: 50%; position: relative; z-index: 10; margin-top: 60px; }
        .p1 { transform: rotate(0deg); } .p2 { transform: rotate(72deg); } .p3 { transform: rotate(144deg); }
        .p4 { transform: rotate(216deg); } .p5 { transform: rotate(288deg); }

        /* --- LOS CONTADORES CON APARICIÓN TARDÍA --- */
        .counters { 
            text-align: center; 
            opacity: 0; 
            animation: fadeIn 1.5s ease-in-out forwards 2.5s; /* Aparece después de la flor */
        }
        
        .timer-box { background: white; padding: 20px; border-radius: 15px; margin: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #ffdae0; min-width: 250px; }
        .timer-box h2 { font-size: 1rem; margin-bottom: 10px; color: #ff4d6d; }
        .time-display { font-family: monospace; font-size: 1.2rem; font-weight: bold; }

        /* --- ANIMACIONES --- */
        @keyframes intro-flower {
            0% { transform: translateX(50vw); } /* Empieza centrada (aprox) */
            100% { transform: translateX(0); }  /* Se queda a la izquierda */
        }

        @keyframes float { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Izquierda -->
        <div class="flower">
            <div class="center"></div>
            <div class="petal p1"></div><div class="petal p2"></div>
            <div class="petal p3"></div><div class="petal p4"></div>
            <div class="petal p5"></div>
        </div>

        <!-- Derecha -->
        <div class="counters">
            <div class="timer-box">
                <h2>✨ Nuestro primer beso</h2>
                <div id="timer-beso" class="time-display">00d 00h 00m 00s</div>
            </div>
            <div class="timer-box">
                <h2>❤️ Desde que somos novios</h2>
                <div id="timer-novios" class="time-display">00d 00h 00m 00s</div>
            </div>
        </div>
    </div>

    <script>
        // RECUERDA AJUSTAR TUS FECHAS AQUÍ (Año, Mes-1, Día, Hora, Minutos)
        const fechaBeso = new Date(2023, 5, 28, 0, 0, 0); 
        const fechaNovios = new Date(2023, 9, 10, 0, 0, 0); 

        function updateTimers() {
            const now = new Date();
            function calculate(start) {
                const diff = now - start;
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                return `${d}d ${h}h ${m}m ${s}s`;
            }
            document.getElementById('timer-beso').innerText = calculate(fechaBeso);
            document.getElementById('timer-novios').innerText = calculate(fechaNovios);
        }
        setInterval(updateTimers, 1000);
        updateTimers();
    </script>
</body>
</html>
