<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestra Historia</title>
    <style>
        body { 
            background: #fffafa; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            color: #b33a5d; 
        }

        .container {
            display: flex;
            width: 90%;
            max-width: 1000px;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
        }

        /* --- CONTENEDOR DE LA FLOR --- */
        .flower-wrapper {
            position: relative;
            width: 100px;
            height: 250px;
            animation: intro-flower 2.5s ease-in-out forwards;
        }

        .flower { 
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            animation: float 4s ease-in-out infinite; 
        }

        /* Pétalos (Exteriores) */
        .petal { 
            width: 40px; height: 70px; 
            background: #ff85a2; 
            position: absolute; 
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%; 
            transform-origin: bottom center;
            box-shadow: inset 0 0 10px rgba(214, 51, 132, 0.2);
            left: 50%;
            margin-left: -20px;
            bottom: 0;
        }
        
        /* Pétalos (Interiores - más pequeños y oscuros) */
        .petal.inner { 
            width: 30px; height: 55px; 
            background: #f06292; 
            z-index: 5; 
        }

        .center { 
            width: 30px; height: 30px; 
            background: #ffd93d; 
            border-radius: 50%; 
            position: absolute; 
            z-index: 10; 
            bottom: -15px; 
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255, 217, 61, 0.6);
        }

        /* Tallo y hoja */
        .stem { width: 6px; height: 150px; background: #8bc34a; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 3px; z-index: -1; }
        .leaf { 
            width: 35px; height: 18px; background: #8bc34a; 
            position: absolute; border-radius: 0 15px 0 15px;
            top: 40px; left: 3px; transform: rotate(-25deg);
        }

        /* Rotaciones precisas para 5 pétalos */
        .p1 { transform: rotate(0deg); } 
        .p2 { transform: rotate(72deg); } 
        .p3 { transform: rotate(144deg); }
        .p4 { transform: rotate(216deg); } 
        .p5 { transform: rotate(288deg); }

        /* --- CONTADORES --- */
        .counters { 
            text-align: center; 
            opacity: 0; 
            animation: fadeIn 2s ease-in-out forwards 2.5s; 
        }
        
        .timer-box { 
            background: white; padding: 20px; border-radius: 20px; 
            margin: 15px; box-shadow: 0 10px 20px rgba(255, 133, 162, 0.15); 
            border: 1px solid #ffdae0; min-width: 260px; 
        }
        .timer-box h2 { font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 10px; color: #d81b60; }
        .time-display { font-family: 'Courier New', Courier, monospace; font-size: 1.3rem; font-weight: bold; }

        /* --- ANIMACIONES --- */
        @keyframes intro-flower {
            0% { transform: translateX(35vw) scale(1.1); }
            100% { transform: translateX(0) scale(1); }
        }

        @keyframes float { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-15px); } 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="flower-wrapper">
            <div class="flower">
                <div class="center"></div>
                <!-- Exteriores -->
                <div class="petal p1"></div><div class="petal p2"></div>
                <div class="petal p3"></div><div class="petal p4"></div>
                <div class="petal p5"></div>
                <!-- Interiores -->
                <div class="petal inner p1"></div><div class="petal inner p2"></div>
                <div class="petal inner p3"></div><div class="petal inner p4"></div>
                <div class="petal inner p5"></div>
                <div class="stem"></div>
                <div class="leaf"></div>
            </div>
        </div>

        <div class="counters">
            <div class="timer-box">
                <h2>✨ NUESTRO PRIMER BESO</h2>
                <div id="timer-beso" class="time-display">...</div>
            </div>
            <div class="timer-box">
                <h2>❤️ DESDE QUE SOMOS NOVIOS</h2>
                <div id="timer-novios" class="time-display">...</div>
            </div>
        </div>
    </div>

    <script>
        // Fechas: 28 Junio (mes 5) y 10 Octubre (mes 9)
        const fechaBeso = new Date(2024, 5, 28, 0, 0, 0); 
        const fechaNovios = new Date(2024, 9, 10, 0, 0, 0); 

        function updateTimers() {
            const now = new Date();
            function calculate(start) {
                const diff = now - start;
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                return `${d}d ${h}h ${m}m ${s}s`;
            }
            document.getElementById('timer-beso').innerText = calculate(fechaBeso);
            document.getElementById('timer-novios').innerText = calculate(fechaNovios);
        }
        setInterval(updateTimers, 1000);
        updateTimers();
    </script>
</body>
</html>
