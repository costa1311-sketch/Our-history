<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestra Historia</title>
    <style>
        body { 
            background: #fffafa; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            color: #b33a5d; 
        }

        .container {
            display: flex;
            width: 90%;
            max-width: 1000px;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
        }

        /* --- FLOR MEJORADA --- */
        .flower-container {
            position: relative;
            animation: intro-flower 2.5s ease-in-out forwards;
        }

        .flower { position: relative; animation: float 4s ease-in-out infinite; }

        /* Capas de pétalos */
        .petal { 
            width: 45px; height: 75px; 
            background: #ff85a2; 
            position: absolute; 
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%; 
            transform-origin: bottom center;
            box-shadow: inset 0 0 15px rgba(214, 51, 132, 0.3);
        }
        
        /* Pétalos internos más oscuros para profundidad */
        .petal.inner { width: 35px; height: 60px; background: #f06292; z-index: 5; bottom: 0; }

        .center { 
            width: 35px; height: 35px; background: #ffd93d; 
            border-radius: 50%; position: relative; z-index: 10; 
            top: 55px; left: 5px;
            box-shadow: 0 0 10px rgba(255, 217, 61, 0.8);
        }

        /* Tallo y hoja */
        .stem { width: 6px; height: 120px; background: #8bc34a; position: absolute; top: 120px; left: 20px; border-radius: 3px; }
        .leaf { 
            width: 30px; height: 15px; background: #8bc34a; 
            position: absolute; border-radius: 0 15px 0 15px;
            top: 150px; left: 25px; transform: rotate(-20deg);
        }

        /* Posiciones de pétalos */
        .p1 { transform: rotate(0deg); } .p2 { transform: rotate(72deg); } .p3 { transform: rotate(144deg); }
        .p4 { transform: rotate(216deg); } .p5 { transform: rotate(288deg); }

        /* --- CONTADORES --- */
        .counters { 
            text-align: center; 
            opacity: 0; 
            animation: fadeIn 2s ease-in-out forwards 2.5s; 
        }
        
        .timer-box { 
            background: white; padding: 25px; border-radius: 20px; 
            margin: 15px; box-shadow: 0 10px 25px rgba(255, 133, 162, 0.2); 
            border: 1px solid #ffdae0; min-width: 280px; 
        }
        .timer-box h2 { font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 15px; color: #d81b60; }
        .time-display { font-family: 'Courier New', Courier, monospace; font-size: 1.4rem; font-weight: bold; }

        /* --- ANIMACIONES --- */
        @keyframes intro-flower {
            0% { transform: translateX(35vw) scale(1.2); }
            100% { transform: translateX(0) scale(1); }
        }

        @keyframes float { 
            0%, 100% { transform: translateY(0) rotate(0deg); } 
            50% { transform: translateY(-20px) rotate(2deg); } 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="flower-container">
            <div class="flower">
                <div class="center"></div>
                <!-- Pétalos exteriores -->
                <div class="petal p1"></div><div class="petal p2"></div>
                <div class="petal p3"></div><div class="petal p4"></div>
                <div class="petal p5"></div>
                <!-- Pétalos interiores -->
                <div class="petal inner p1" style="bottom: 5px; left: 5px;"></div>
                <div class="petal inner p2" style="bottom: 5px; left: 5px;"></div>
                <div class="petal inner p3" style="bottom: 5px; left: 5px;"></div>
                <div class="petal inner p4" style="bottom: 5px; left: 5px;"></div>
                <div class="petal inner p5" style="bottom: 5px; left: 5px;"></div>
                <div class="stem"></div>
                <div class="leaf"></div>
            </div>
        </div>

        <div class="counters">
            <div class="timer-box">
                <h2>✨ Nuestro primer beso</h2>
                <div id="timer-beso" class="time-display">...</div>
            </div>
            <div class="timer-box">
                <h2>❤️ El inicio de nuestro "Nosotros"</h2>
                <div id="timer-novios" class="time-display">...</div>
            </div>
        </div>
    </div>

    <script>
        // FECHAS CONFIGURADAS (Meses en JS: Enero=0, Junio=5, Octubre=9)
        const fechaBeso = new Date(2024, 5, 28, 0, 0, 0); 
        const fechaNovios = new Date(2024, 9, 10, 0, 0, 0); 

        function updateTimers() {
            const now = new Date();
            function calculate(start) {
                const diff = now - start;
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                return `${d}d ${h}h ${m}m ${s}s`;
            }
            document.getElementById('timer-beso').innerText = calculate(fechaBeso);
            document.getElementById('timer-novios').innerText = calculate(fechaNovios);
        }
        setInterval(updateTimers, 1000);
        updateTimers();
    </script>
</body>
</html>
